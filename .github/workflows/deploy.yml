name: Auto Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Vercel
        uses: Gourav2609/vercel-auto-deploy@v1
        with:
          exclude-authors: 'palanisamyr22'
          vercel-deploy-hook: ${{ secrets.VERCEL_DEPLOY_HOOK }}
